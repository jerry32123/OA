{% extends 'base.html' %}

{% block title %}请假申请 - OA系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>请假申请</h4>
                </div>
                <div class="card-body">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label">请假类型</label>
                            <select class="form-select" name="leave_type" required>
                                <option value="">请选择请假类型</option>
                                <option value="事假">事假</option>
                                <option value="病假">病假</option>
                                <option value="年假">年假</option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">开始日期</label>
                                <input type="date" class="form-control" name="start_time" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">结束日期</label>
                                <input type="date" class="form-control" name="end_time" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">请假原因</label>
                            <textarea class="form-control" name="reason" rows="3" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">提交申请</button>
                        <a href="{{ url_for('my_leave') }}" class="btn btn-secondary ms-2">查看我的请假</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
