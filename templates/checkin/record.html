{% extends 'base.html' %}

{% block title %}签到记录 - OA系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>我的签到记录</h3>
    <div class="card mt-3">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>签到时间</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for record in records %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ record.check_in_time.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                            <td>
                                <span class="badge {% if record.status == '正常' %}bg-success{% else %}bg-warning{% endif %}">
                                    {{ record.status }}
                                </span>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center text-muted">暂无签到记录</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
