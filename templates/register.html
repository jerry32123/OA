<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OA系统 - 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>OA办公系统 - 用户注册</h4>
                    </div>
                    <div class="card-body">
                        <!-- 复用原有消息提示逻辑 -->
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <!-- 注册表单：保留CSRF令牌，新增模型所需字段 -->
                        <form method="POST">
                            <!-- 复用原有CSRF令牌（若项目启用了Flask-WTF的CSRF保护） -->
                            {% if csrf_token() %}
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            {% endif %}

                            <!-- 用户名 -->
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <!-- 密码 -->
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <!-- 真实姓名 -->
                            <div class="mb-3">
                                <label for="real_name" class="form-label">真实姓名</label>
                                <input type="text" class="form-control" id="real_name" name="real_name" required>
                            </div>
                            <!-- 所属部门（下拉框，可选固定选项） -->
                            <div class="mb-3">
                                <label for="department" class="form-label">所属部门</label>
                                <select class="form-select" id="department" name="department" required>
                                    <option value="">请选择部门</option>
                                    <option value="技术部">技术部</option>
                                    <option value="行政部">行政部</option>
                                    <option value="人事部">人事部</option>
                                    <option value="财务部">财务部</option>
                                    <option value="市场部">市场部</option>
                                </select>
                            </div>
                            <!-- 角色（限制仅能选普通员工，防止注册管理员/经理） -->
                            <div class="mb-3">
                                <label for="role" class="form-label">角色</label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="employee" selected>普通员工（employee）</option>
                                    <!-- 隐藏admin/manager选项，仅允许后台配置 -->
                                    <!-- <option value="manager">经理（manager）</option> -->
                                    <!-- <option value="admin">管理员（admin）</option> -->
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">注册</button>
                        </form>
                    </div>
                    <div class="card-footer text-center text-muted">
                        <small>已有账号？<a href="{{ url_for('login') }}">立即登录</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 复用原有JS依赖 -->
    <script src="https://cdn.staticfile.org/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
