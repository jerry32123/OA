{% extends 'base.html' %}

{% block title %}编辑合同 - OA系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>编辑合同</h3>
    <div class="card mt-3">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label">合同名称</label>
                    <input type="text" class="form-control" name="contract_name" value="{{ contract.contract_name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">合同编号</label>
                    <input type="text" class="form-control" name="contract_no" value="{{ contract.contract_no }}" required>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">甲方</label>
                        <input type="text" class="form-control" name="party_a" value="{{ contract.party_a }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">乙方</label>
                        <input type="text" class="form-control" name="party_b" value="{{ contract.party_b }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">签订日期</label>
                    <input type="date" class="form-control" name="sign_time" value="{{ contract.sign_time.strftime('%Y-%m-%d') }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">合同内容</label>
                    <textarea class="form-control" name="content" rows="5">{{ contract.content }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">状态</label>
                    <select class="form-select" name="status">
                        <option value="有效" {% if contract.status == '有效' %}selected{% endif %}>有效</option>
                        <option value="失效" {% if contract.status == '失效' %}selected{% endif %}>失效</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="{{ url_for('contract_list') }}" class="btn btn-secondary ms-2">取消</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
