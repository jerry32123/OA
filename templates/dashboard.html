{% extends 'base.html' %}

{% block title %}OA系统 - 仪表盘{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">欢迎使用OA办公系统</h2>
                    <p class="card-text">当前时间：{{ current_time or '未知时间' }}</p>
                    <p class="card-text">您的角色：{{ role or '普通员工' }}，部门：{{ department or '未知部门' }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
