{% extends 'base.html' %}

{% block title %}领用设备 - OA系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>领用设备</h3>
    <div class="card mt-3">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>设备名称</th>
                            <th>设备类型</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for equip in equipments %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ equip.name }}</td>
                            <td>{{ equip.type }}</td>
                            <td>
                                <form method="POST">
                                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                    <input type="hidden" name="equip_id" value="{{ equip.id }}">
                                    <button type="submit" class="btn btn-primary btn-sm">领用</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="text-center text-muted">暂无空闲设备可领用</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
